<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandon Van | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none; /* Prevents users from accidentally clicking the pause button */
            overflow: hidden;
            background: black;
        }

        /* This "scales up" the iframe to hide the Google Drive UI bars */
        .video-wrapper iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 Aspect Ratio */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.2); /* Scale(1.2) crops the Drive buttons out */
            filter: brightness(0.4);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div class="video-wrapper">
        <iframe src="https://drive.google.com/file/d/1N6wwKtKjsd8Wya-945sJrayHqFzxDWTP/preview?autoplay=1" 
                allow="autoplay"></iframe>
    </div>

    <nav class="p-8 flex justify-between items-center relative z-10">
        <h1 class="text-xl font-bold tracking-[0.3em] uppercase">Brandon Van</h1>
    </nav>

    <main class="h-[70vh] flex flex-col justify-center items-center text-center px-4 relative z-10">
        <h2 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter">FILMMAKER</h2>
        <p class="text-xs md:text-sm max-w-2xl text-gray-400 uppercase tracking-[0.5em]">Creative Direction &bull; Scriptwriting</p>
    </main>

    <section class="py-24 px-8 relative z-10">
        <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-8 rounded-sm">
                <h4 class="text-xl font-bold mb-4 uppercase">Script Vault</h4>
                <p class="text-gray-400 text-sm mb-6 leading-relaxed">Request access to my latest feature and short film screenplays.</p>
                <button onclick="openModal('Script Vault')" class="border border-white px-6 py-2 text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition">Enter Vault</button>
            </div>
        </div>
    </section>

    <div id="requestModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-6 backdrop-blur-md">
        <div class="bg-zinc-950 p-8 rounded-sm max-w-md w-full border border-zinc-800">
            <h3 class="text-lg font-bold mb-4 uppercase tracking-widest">Request Access</h3>
            <form action="https://formspree.io/f/your-id-here" method="POST" class="space-y-4">
                <input type="text" name="name" placeholder="Name" class="w-full bg-transparent border-b border-zinc-800 py-2 focus:outline-none focus:border-white">
                <input type="email" name="email" placeholder="Email" class="w-full bg-transparent border-b border-zinc-800 py-2 focus:outline-none focus:border-white">
                <button type="submit" class="w-full py-3 bg-white text-black font-bold uppercase text-[10px] tracking-widest">Send Request</button>
                <button type="button" onclick="closeModal()" class="w-full text-[10px] text-zinc-500 uppercase py-2">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(title) { document.getElementById('requestModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('requestModal').classList.add('hidden'); }
    </script>
</body>
</html>
